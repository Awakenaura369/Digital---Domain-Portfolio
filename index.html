<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marketing Beast AI | Premium Hub</title>
    <style>
        :root {
            --bg: #080a10; --neon: #39FF14; --glass: rgba(255, 255, 255, 0.03); --border: rgba(255, 255, 255, 0.1);
        }

        body {
            background-color: var(--bg); color: #fff; font-family: 'Inter', sans-serif;
            margin: 0; padding: 50px 20px;
        }

        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(340px, 1fr)); gap: 30px; }

        /* Card Style */
        .card {
            background: var(--glass); backdrop-filter: blur(20px); border: 1px solid var(--border);
            border-radius: 28px; padding: 30px; cursor: pointer; transition: 0.3s;
        }
        .card:hover { border-color: var(--neon); transform: translateY(-5px); }

        .category { color: var(--neon); font-size: 0.7rem; text-transform: uppercase; border: 1px solid; padding: 3px 10px; border-radius: 50px; }
        .title { font-size: 1.5rem; margin: 15px 0; }
        .snippet { color: #aaa; font-size: 0.95rem; line-height: 1.6; }

        /* Modal (Popup) Style */
        #articleModal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); z-index: 1000;
        }

        .modal-content {
            background: #0d1117; border: 1px solid var(--border); width: 80%; max-width: 800px;
            margin: 5% auto; padding: 40px; border-radius: 30px; max-height: 80vh; overflow-y: auto;
        }

        .close-btn { color: var(--neon); float: right; font-size: 2rem; cursor: pointer; }
        .modal-body { line-height: 1.8; color: #ddd; }
        .modal-body h3 { color: var(--neon); }

        /* Scrollbar Style */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-thumb { background: var(--neon); border-radius: 10px; }
    </style>
</head>
<body>

    <div class="grid" id="mainGrid"></div>

    <div id="articleModal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <div id="modalData"></div>
        </div>
    </div>

    <script>
        let allArticles = [];

        async function load() {
            const res = await fetch('articles.json');
            allArticles = await res.json();
            const grid = document.getElementById('mainGrid');
            
            allArticles.forEach((art, i) => {
                const card = document.createElement('div');
                card.className = 'card';
                card.onclick = () => openModal(i);
                card.innerHTML = `
                    <span class="category">${art.category}</span>
                    <h2 class="title">${art.title}</h2>
                    <p class="snippet">${art.snippet}</p>
                    <small style="color:var(--neon)">Click to read more →</small>
                `;
                grid.appendChild(card);
            });
        }

        function openModal(index) {
            const art = allArticles[index];
            document.getElementById('modalData').innerHTML = `
                <h1 style="color:var(--neon)">${art.title}</h1>
                <hr style="border:0.5px solid var(--border)">
                <div class="modal-body">${art.full_content}</div>
            `;
            document.getElementById('articleModal').style.display = 'block';
        }

        function closeModal() {
            document.getElementById('articleModal').style.display = 'none';
        }

        window.onload = load;
    </script>
</body>
</html>
