name: Generate AI Articles

on:
  schedule:
    - cron: '0 0 * * *' # هادي كتقول ليه يخدم كل ليلة مع 12
  workflow_dispatch: # هادي كتعطيك بوطونة باش تخدمو وقتما بغيتي يدوياً

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install groq

      - name: Run Generator Script
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }} # السر هنا!
        run: python your_script_name.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add articles.json
          git commit -m "Auto-update articles from Groq" || exit 0
          git push
