<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mouhcine Digital - Domain Portfolio</title>
    <style>
        :root {
            --primary-neon: #39FF14; 
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
            --bg-color: #080a10;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(57, 255, 20, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(0, 200, 255, 0.05) 0%, transparent 40%);
            color: white;
            min-height: 100vh;
            padding: 50px 20px;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 60px;
        }

        header h1 {
            font-size: 2.8rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            background: linear-gradient(to right, #fff, var(--primary-neon));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .domains-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 30px;
        }

        /* الكرت الزجاجي مع الأنميشن */
        .domain-card {
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 40px 30px;
            text-align: center;
            transition: all 0.5s ease;
            position: relative;
            overflow: hidden; /* ضروري باش الضوء ما يخرجش على الكرت */
        }

        /* إضافة تأثير الضوء المتحرك */
        .domain-card::before {
            content: "";
            position: absolute;
            top: 0;
            left: -100%; /* كيبدا من برا الكرت */
            width: 50%;
            height: 100%;
            background: linear-gradient(
                to right,
                transparent,
                rgba(255, 255, 255, 0.1),
                transparent
            );
            transform: skewX(-25deg); /* كيميل الضوء شوية */
            transition: none;
        }

        /* تحريك الضوء عند التمرير */
        .domain-card:hover::before {
            left: 150%;
            transition: 0.7s ease-in-out;
        }

        .domain-card:hover {
            transform: translateY(-12px);
            border-color: var(--primary-neon);
            box-shadow: 0 20px 40px rgba(57, 255, 20, 0.15);
        }

        .domain-name {
            font-size: 1.8rem;
            font-weight: 800;
            margin-bottom: 10px;
            display: block;
            color: #fff;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.2);
        }

        .category-tag {
            background: rgba(57, 255, 20, 0.1);
            color: var(--primary-neon);
            padding: 6px 18px;
            border-radius: 50px;
            font-size: 0.75rem;
            font-weight: bold;
            text-transform: uppercase;
            margin-bottom: 25px;
            display: inline-block;
            border: 1px solid rgba(57, 255, 20, 0.2);
        }

        .price {
            display: block;
            font-size: 1.3rem;
            margin-bottom: 30px;
            color: #aaa;
            font-weight: 300;
        }

        .buy-btn {
            display: inline-block;
            background: transparent;
            border: 1.5px solid var(--primary-neon);
            color: var(--primary-neon);
            padding: 12px 35px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: bold;
            transition: 0.4s;
            position: relative;
            z-index: 2; /* باش يبقى فوق تأثير الضوء */
        }

        .buy-btn:hover {
            background: var(--primary-neon);
            color: #000;
            box-shadow: 0 0 25px var(--primary-neon);
            transform: scale(1.05);
        }

        footer {
            margin-top: 100px;
            text-align: center;
            color: #444;
            font-size: 0.85rem;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            padding-top: 30px;
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>Mouhcine Digital Systems</h1>
            <p style="color: #666; margin-top: 10px;">Premium Domain Portfolio</p>
        </header>

        <div class="domains-grid">
            
            <div class="domain-card">
                <span class="category-tag">Fintech / AI</span>
                <span class="domain-name">techievest.com</span>
                <span class="price">Make an Offer</span>
                <a href="https://dan.com/buy-domain/techievest.com" class="buy-btn">View on Dan.com</a>
            </div>

            <div class="domain-card">
                <span class="category-tag">Marketing Automation</span>
                <span class="domain-name">aimarketingbeast.com</span>
                <span class="price">$2,499</span>
                <a href="#" class="buy-btn">Buy Now</a>
            </div>

            <div class="domain-card">
                <span class="category-tag">Social Media / Agency</span>
                <span class="domain-name">socialdigi.com</span>
                <span class="price">$1188</span>
                <a href="#" class="buy-btn">Buy Now</a>
            </div>

        </div>

        <footer>
            &copy; 2026 Mouhcine Digital Systems. Designed for high-end digital assets.
        </footer>
    </div>

</body>
</html>
