<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marketing Beast AI | Premium Tech Hub</title>
    <style>
        :root {
            --bg: #080a10;
            --neon: #39FF14;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
        }

        body {
            background-color: var(--bg);
            color: #ffffff;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            margin: 0;
            padding: 50px 20px;
            background-image: radial-gradient(circle at top right, rgba(57, 255, 20, 0.07), transparent);
        }

        .container { max-width: 1200px; margin: 0 auto; }
        
        .header { text-align: center; margin-bottom: 60px; }
        .header h1 { font-size: 3rem; text-transform: uppercase; letter-spacing: 4px; margin: 0; }
        .header span { color: var(--neon); text-shadow: 0 0 15px var(--neon); }
        .header p { color: #888; margin-top: 10px; font-size: 1.1rem; }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
            gap: 30px;
        }

        .card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 28px;
            padding: 35px;
            position: relative;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .card:hover { 
            transform: translateY(-12px); 
            border-color: var(--neon);
            box-shadow: 0 20px 40px rgba(57, 255, 20, 0.1);
        }

        /* Skeleton Shimmer */
        .skeleton {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 14px;
            position: relative;
            overflow: hidden;
        }

        .skeleton::after {
            content: "";
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.08), transparent);
            animation: shimmer 1.8s infinite;
        }

        @keyframes shimmer { 100% { left: 100%; } }

        .sk-img { height: 180px; margin-bottom: 25px; }
        .sk-title { height: 30px; width: 80%; margin-bottom: 15px; }
        .sk-text { height: 18px; width: 100%; margin-bottom: 10px; }

        /* Actual Content */
        .content { display: none; }
        .ready .content { display: block; }
        .ready .skeleton { display: none; }

        .category { 
            font-size: 0.75rem; 
            text-transform: uppercase; 
            color: var(--neon); 
            letter-spacing: 1px;
            border: 1px solid var(--neon); 
            padding: 4px 12px; 
            border-radius: 50px;
            display: inline-block;
            margin-bottom: 20px;
        }

        .title { font-size: 1.6rem; font-weight: 700; margin-bottom: 15px; line-height: 1.3; }
        .snippet { color: #a0a0a0; line-height: 1.7; font-size: 1rem; }

        footer { text-align: center; margin-top: 80px; color: #444; font-size: 0.9rem; }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>Marketing <span>Beast</span> AI</h1>
            <p>Autonomous AI Content Engine & Tech Insights</p>
        </div>

        <div class="grid" id="mainGrid">
            </div>

        <footer>
            &copy; 2026 Mouhcine Digital Systems. Powered by Groq Llama-3.
        </footer>
    </div>

    <script>
        async function fetchArticles() {
            const grid = document.getElementById('mainGrid');
            try {
                const res = await fetch('articles.json');
                if (!res.ok) throw new Error();
                const articles = await res.json();
                
                grid.innerHTML = '';

                articles.forEach((art, i) => {
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.innerHTML = `
                        <div class="skeleton sk-img"></div>
                        <div class="skeleton sk-title"></div>
                        <div class="skeleton sk-text"></div>
                        <div class="skeleton sk-text"></div>
                        <div class="content">
                            <span class="category">${art.category}</span>
                            <h2 class="title">${art.title}</h2>
                            <p class="snippet">${art.snippet}</p>
                        </div>
                    `;
                    grid.appendChild(card);
                    
                    setTimeout(() => card.classList.add('ready'), 800 + (i * 150));
                });
            } catch (e) {
                grid.innerHTML = '<p style="text-align:center; width:100%; color:#555;">Initializing AI Engine... Please check back in a moment.</p>';
            }
        }
        window.onload = fetchArticles;
    </script>
</body>
</html>
