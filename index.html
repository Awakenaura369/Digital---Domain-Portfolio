<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glass Thermometer UI</title>
    <style>
        :root {
            --primary-green: #39FF14; /* لون النيون */
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --bg-dark: #0f111a;
        }

        body {
            background-color: var(--bg-dark);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            color: white;
        }

        /* حاوية التصميم الزجاجي */
        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 60px;
            padding: 50px 30px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
            text-align: center;
            width: 120px;
            position: relative;
        }

        .thermostat-inner {
            height: 350px;
            display: flex;
            justify-content: center;
            position: relative;
        }

        /* أنبوب الميزان */
        .track {
            width: 25px;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 20px;
            overflow: hidden;
            position: relative;
            cursor: pointer;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* السائل الأخضر (الزئبق) */
        .mercury {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 64%; /* القيمة الافتراضية */
            background: linear-gradient(to top, #11998e, var(--primary-green));
            box-shadow: 0 0 25px var(--primary-green);
            transition: height 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* قراءة النص */
        .temp-readout {
            margin-top: 30px;
        }

        .temp-value {
            font-size: 3rem;
            font-weight: bold;
            color: var(--primary-green);
            text-shadow: 0 0 15px rgba(57, 255, 20, 0.5);
        }

        .temp-label {
            font-size: 0.7rem;
            letter-spacing: 2px;
            color: #888;
            margin-top: 5px;
        }

        .status-text {
            font-size: 0.9rem;
            margin-top: 10px;
            color: #ccc;
        }

        /* تأثير اللمعان على الزجاج */
        .glass-panel::after {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            border-radius: 60px;
            background: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, transparent 50%);
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="glass-panel">
        <div class="thermostat-inner">
            <div class="track" id="track">
                <div class="mercury" id="mercury"></div>
            </div>
        </div>

        <div class="temp-readout">
            <div class="temp-value" id="tempValue">64°</div>
            <div class="temp-label">CURRENT TEMP</div>
            <div class="status-text" id="statusText">Comfortable</div>
        </div>
    </div>

    <script>
        const mercury = document.getElementById('mercury');
        const tempValue = document.getElementById('tempValue');
        const statusText = document.getElementById('statusText');
        const track = document.getElementById('track');

        track.addEventListener('click', (e) => {
            const rect = track.getBoundingClientRect();
            const y = e.clientY - rect.top; // مكان الضغطة بالنسبة للأنبوب
            
            // حساب النسبة المئوية (من تحت لفوق)
            let heightPercent = 100 - (y / rect.height * 100);
            
            // حصر القيمة بين 0 و 100
            heightPercent = Math.max(0, Math.min(100, Math.round(heightPercent)));
            
            // تحديث الواجهة
            mercury.style.height = heightPercent + '%';
            tempValue.innerText = heightPercent + '°';
            
            // تحديث الحالة بناءً على الدرجة
            if (heightPercent > 80) {
                statusText.innerText = "Hot";
                tempValue.style.color = "#ff4b2b"; // تغيير اللون للأحمر في الحرارة
            } else if (heightPercent > 40) {
                statusText.innerText = "Comfortable";
                tempValue.style.color = "#39FF14";
            } else {
                statusText.innerText = "Cool";
                tempValue.style.color = "#00d2ff"; // تغيير اللون للأزرق في البرودة
            }
        });
    </script>
</body>
</html>
